<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Jira Filter Switcher</title>
  <link rel="stylesheet" href="./popup.css" />
</head>

<body>
  <div id="app">
    <header class="popup-header">
      <h1>Jira Filter Switcher</h1>
    </header>

    <section class="popup-section">
      <div class="section-title" data-i18n="urlPatternsTitle"></div>
      <div class="section-desc" data-i18n-html="urlPatternsDesc"></div>
      <div id="url-patterns-container"></div>
      <div class="add-pattern-row">
        <input id="new-pattern-input" type="text" data-i18n-placeholder="patternPlaceholder" class="text-input" />
        <button id="add-pattern-btn" class="btn-primary btn-sm" data-i18n="addButton"></button>
      </div>
    </section>

    <section class="popup-section">
      <div class="section-title" data-i18n="exportImportTitle"></div>
      <div class="btn-row">
        <button id="export-btn" class="btn-secondary" data-i18n="exportButton"></button>
        <label class="btn-secondary import-label">
          <span data-i18n="importButton"></span>
          <input id="import-input" type="file" accept=".json" style="display:none" />
        </label>
      </div>
      <div id="import-status" class="status-msg"></div>
    </section>

    <footer class="popup-footer">
      <span id="filter-count" class="filter-count"></span>
    </footer>
  </div>
  <script type="module" src="./popup.ts"></script>
</body>

</html>
