<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Jira Filter Switcher</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <div id="app">
      <header class="popup-header">
        <span class="popup-logo">⚡</span>
        <h1>Jira Filter Switcher</h1>
      </header>

      <section class="popup-section">
        <div class="section-title">Active URL Patterns</div>
        <div class="section-desc">Panel appears on pages matching these patterns. Use <code>*</code> as wildcard.</div>
        <div id="url-patterns-container"></div>
        <div class="add-pattern-row">
          <input id="new-pattern-input" type="text" placeholder="https://*.atlassian.net/*" class="text-input" />
          <button id="add-pattern-btn" class="btn-primary btn-sm">Add</button>
        </div>
      </section>

      <section class="popup-section">
        <div class="section-title">Data</div>
        <div class="btn-row">
          <button id="export-btn" class="btn-secondary">Export .json</button>
          <label class="btn-secondary import-label">
            Import .json
            <input id="import-input" type="file" accept=".json" style="display:none" />
          </label>
        </div>
        <div id="import-status" class="status-msg"></div>
      </section>

      <footer class="popup-footer">
        <span id="filter-count" class="filter-count"></span>
      </footer>
    </div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
